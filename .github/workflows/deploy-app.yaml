name: Build and Deploy to Kubernetes

on:
  push:
    branches:
      - main
      - master
      - develop
      - 'releases/**'
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Setup kubectl for EKS
        run: |
          aws eks --region us-east-1 update-kubeconfig --name eks-cluster

      - name: Create Kubernetes namespace
        run: kubectl create namespace ${{ secrets.NAMESPACE }} || true

      - name: Apply Kubernetes config map
        working-directory: .kube/app
        run: kubectl apply -f deployment-app.yaml --namespace ${{ secrets.NAMESPACE }}

      - name: Apply Kubernetes pv
        working-directory: .kube/app
        run: kubectl apply -f app-service.yaml --namespace ${{ secrets.NAMESPACE }}