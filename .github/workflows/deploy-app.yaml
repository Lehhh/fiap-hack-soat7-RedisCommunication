name: Build and Deploy app in Kubernetes

on:
  push:
    branches:
      - main
      - master
      - develop
      - 'releases/**'
      - 'feature/**'
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Setup kubectl for EKS
        run: |
          aws eks --region us-east-1 update-kubeconfig --name eks-cluster

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin ${{ secrets.ECR_REPOSITORY_URL }}

      - name: Create ECR repository
        run: |
          aws ecr describe-repositories --repository-names ${{ vars.ECR_REPOSITORY_URL }}${{ vars.IMAGE_CORE }} --region us-east-1 || \
          aws ecr create-repository --repository-name ${{ secrets.IMAGE_REDIS_COMMUNICATION }} --region us-east-1

      - name: Create Kubernetes namespace
        run: kubectl create namespace ${{ secrets.NAMESPACE }} || true

      - name: Replace image placeholder
        run: sed -i 's|IMAGE_CORE_PLACEHOLDER|${{ secrets.IMAGE_REDIS_COMMUNICATION }}:1.0.0|g' .kube/app/app-deployment.yaml

      - name: Build Docker image
        run: docker build -t ${{ vars.ECR_REPOSITORY_URL }}${{ vars.IMAGE_CORE }}:1.0.0 .

      - name: Push Docker image to ECR
        run: docker push ${{ vars.ECR_REPOSITORY_URL }}${{ vars.IMAGE_CORE }}:1.0.0


      - name: Apply Kubernetes deployment
        working-directory: .kube/app
        run: kubectl apply -f app-deployment.yaml --namespace ${{ secrets.NAMESPACE }} || true

      - name: Apply Kubernetes service
        working-directory: .kube/app
        run: kubectl apply -f app-service.yaml --namespace ${{ secrets.NAMESPACE }} || true


